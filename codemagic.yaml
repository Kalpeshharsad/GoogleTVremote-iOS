workflows:
  ios-unsigned-build:
    name: iOS Unsigned Build for TrollStore
    environment:
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
        - $HOME/.cocoapods
    scripts:
      - name: Install dependencies
        script: |
          brew install swiftlint

      - name: Setup build environment
        script: |
          mkdir -p build
          
      - name: Build unsigned IPA
        script: |
          # Create a temporary build directory
          BUILD_DIR="build"
          DERIVED_DATA="$BUILD_DIR/DerivedData"
          
          # Check if workspace exists, otherwise use project
          if [ -d "GoogleTVRemote.xcworkspace" ]; then
            PROJECT_FLAG="-workspace GoogleTVRemote.xcworkspace"
          elif [ -d "GoogleTVRemote.xcodeproj" ]; then
            PROJECT_FLAG="-project GoogleTVRemote.xcodeproj"
          else
            echo "Error: No Xcode project or workspace found."
            exit 1
          fi
          
          # Build for iOS using xcodebuild without code signing
          xcodebuild \
            $PROJECT_FLAG \
            -scheme GoogleTVRemote \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -arch arm64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -quiet
          
      - name: Create unsigned IPA
        script: |
          BUILD_DIR="build"
          DERIVED_DATA="$BUILD_DIR/DerivedData"
          BUILD_PRODUCTS="$DERIVED_DATA/Build/Products/Release-iphoneos"
          OUTPUT_DIR="build/output"
          
          mkdir -p "$OUTPUT_DIR"
          
          # Create the Payload directory structure for unsigned IPA
          mkdir -p Payload
          cp -r "$BUILD_PRODUCTS/GoogleTVRemote.app" Payload/
          
          # Create unsigned IPA
          zip -r "$OUTPUT_DIR/GoogleTVRemote-unsigned.ipa" Payload/
          rm -rf Payload
          
          echo "Unsigned IPA created at: $OUTPUT_DIR/GoogleTVRemote-unsigned.ipa"

    artifacts:
      - build/output/GoogleTVRemote-unsigned.ipa

  ios-simulator-build:
    name: iOS Simulator Build (Testing)
    environment:
      xcode: latest
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    scripts:
      - name: Build for simulator
        script: |
          BUILD_DIR="build"
          DERIVED_DATA="$BUILD_DIR/DerivedData"
          
          # Check if workspace exists, otherwise use project
          if [ -d "GoogleTVRemote.xcworkspace" ]; then
            PROJECT_FLAG="-workspace GoogleTVRemote.xcworkspace"
          elif [ -d "GoogleTVRemote.xcodeproj" ]; then
            PROJECT_FLAG="-project GoogleTVRemote.xcodeproj"
          else
            echo "Error: No Xcode project or workspace found."
            exit 1
          fi
          
          xcodebuild \
            $PROJECT_FLAG \
            -scheme GoogleTVRemote \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA" \
            -arch x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            -quiet

      - name: Test app
        script: |
          echo "Simulator build completed successfully"

    artifacts:
      - build/DerivedData/Build/Products/Debug-iphonesimulator/GoogleTVRemote.app
