workflows:
  ios-unsigned:
    name: iOS Unsigned (Jailbreak)
    environment:
      flutter: stable
    scripts:
      - name: Build Unsigned IPA
        script: | 
          set -e
          
          # Force unsigned build via environment variables
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          
          flutter build ios --release --no-codesign
          
          # Create Payload and IPA
          rm -rf build/ios/iphoneos/Payload
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r premium_app_unsigned.ipa Payload
          rm -rf Payload
    artifacts:
      - build/ios/iphoneos/*.ipa